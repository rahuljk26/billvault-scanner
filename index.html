<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BillVault Scanner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0F1117;
      color: #F0F4FF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    .header {
      width: 100%;
      background: #1A1D27;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2D3154;
    }
    .header-logo { font-size: 22px; }
    .header-title { font-size: 16px; font-weight: 600; color: #F0F4FF; }
    .header-sub { font-size: 11px; color: #8B92B8; }

    /* Main content */
    .content {
      width: 100%;
      max-width: 420px;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Status card */
    .status-card {
      width: 100%;
      background: #1A1D27;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid #2D3154;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #8B92B8;
      flex-shrink: 0;
    }
    .status-dot.active { background: #22C55E; box-shadow: 0 0 8px #22C55E; }
    .status-dot.error { background: #EF4444; }
    .status-text { font-size: 13px; color: #8B92B8; }

    /* Camera box */
    .camera-wrapper {
      width: 100%;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      border: 2px solid #2D3154;
      background: #000;
      aspect-ratio: 1;
    }
    .camera-wrapper.scanning { border-color: #6C63FF; box-shadow: 0 0 20px rgba(108,99,255,0.3); }
    .camera-wrapper.success { border-color: #22C55E; box-shadow: 0 0 20px rgba(34,197,94,0.4); }

    video, canvas {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    canvas { position: absolute; top: 0; left: 0; display: none; }

    /* Scan overlay */
    .scan-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .scan-frame {
      width: 65%;
      aspect-ratio: 1;
      border: 3px solid #6C63FF;
      border-radius: 12px;
      position: relative;
    }
    .scan-frame::before {
      content: '';
      position: absolute;
      top: -3px; left: -3px; right: -3px;
      height: 4px;
      background: #6C63FF;
      border-radius: 2px;
      animation: scan 2s linear infinite;
    }
    @keyframes scan {
      0% { top: -3px; }
      100% { top: calc(100% - 1px); }
    }

    /* Success overlay */
    .success-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(34,197,94,0.15);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
    }
    .success-overlay.show { display: flex; }
    .success-icon { font-size: 56px; }
    .success-label { font-size: 18px; font-weight: 600; color: #22C55E; }

    /* Instruction */
    .instruction {
      text-align: center;
      font-size: 14px;
      color: #8B92B8;
      line-height: 1.6;
    }
    .instruction strong { color: #F0F4FF; }

    /* Result card */
    .result-card {
      width: 100%;
      background: #1A1D27;
      border-radius: 16px;
      padding: 16px;
      border: 1px solid #22C55E;
      display: none;
    }
    .result-card.show { display: block; }
    .result-label { font-size: 11px; color: #8B92B8; margin-bottom: 6px; }
    .result-id {
      font-size: 18px;
      font-weight: 700;
      color: #22C55E;
      font-family: monospace;
      letter-spacing: 1px;
    }
    .result-status {
      font-size: 12px;
      color: #8B92B8;
      margin-top: 8px;
    }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.8; }
    .btn-primary { background: #6C63FF; color: #fff; }
    .btn-success { background: #22C55E; color: #fff; }
    .btn-outline {
      background: transparent;
      color: #8B92B8;
      border: 1px solid #2D3154;
    }

    /* Error card */
    .error-card {
      width: 100%;
      background: rgba(239,68,68,0.1);
      border: 1px solid #EF4444;
      border-radius: 12px;
      padding: 14px;
      font-size: 13px;
      color: #EF4444;
      display: none;
    }
    .error-card.show { display: block; }


  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">💳</div>
    <div>
      <div class="header-title">BillVault Scanner</div>
      <div class="header-sub">Merchant QR Scanner</div>
    </div>
  </div>

  <div class="content">

    <!-- Status -->
    <div class="status-card">
      <div class="status-dot" id="statusDot"></div>
      <div class="status-text" id="statusText">Initializing camera...</div>
    </div>

    <!-- Camera -->
    <div class="camera-wrapper" id="cameraWrapper">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="scan-overlay">
        <div class="scan-frame"></div>
      </div>
      <div class="success-overlay" id="successOverlay">
        <div class="success-icon">✅</div>
        <div class="success-label">Scanned!</div>
      </div>
    </div>

    <!-- Instruction -->
    <p class="instruction">
      Point the camera at the <strong>customer's BillVault QR code</strong>.<br/>
      The bill will link automatically.
    </p>

    <!-- Error -->
    <div class="error-card" id="errorCard"></div>

    <!-- Result -->
    <div class="result-card" id="resultCard">
      <div class="result-label">Customer ID detected</div>
      <div class="result-id" id="resultId"></div>
      <div class="result-status" id="resultStatus">Sending to merchant app...</div>
    </div>

    <!-- Scan again button -->
    <button class="btn btn-outline" id="scanAgainBtn" style="display:none" onclick="resetScanner()">
      📷 Scan Next Customer
    </button>

  </div>

  <script>
    // ── Firebase Config ────────────────────────────────────────────────────
    const firebaseConfig = {
      apiKey: "AIzaSyBOvMjKZbGO65Gvb_77Zu_ndp3YoIDKBoI",
      authDomain: "billvault-9d571.firebaseapp.com",
      projectId: "billvault-9d571",
      storageBucket: "billvault-9d571.firebasestorage.app",
      messagingSenderId: "95121972208",
      appId: "1:95121972208:web:3da4af7e01b01b4dd1db35"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ── Elements ───────────────────────────────────────────────────────────
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const cameraWrapper = document.getElementById('cameraWrapper');
    const successOverlay = document.getElementById('successOverlay');
    const errorCard = document.getElementById('errorCard');
    const resultCard = document.getElementById('resultCard');
    const resultId = document.getElementById('resultId');
    const resultStatus = document.getElementById('resultStatus');
    const scanAgainBtn = document.getElementById('scanAgainBtn');
    const sessionInput = document.getElementById('sessionInput');

    let scanning = false;
    let animFrame = null;

    // ── Start Camera ───────────────────────────────────────────────────────
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 1280 } }
        });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          scanning = true;
          cameraWrapper.classList.add('scanning');
          setStatus('active', 'Ready to scan — point at customer QR');
          scanLoop();
        };
      } catch (err) {
        setStatus('error', 'Camera access denied. Please allow camera.');
        showError('Could not access camera: ' + err.message);
      }
    }

    // ── Scan Loop ──────────────────────────────────────────────────────────
    let lastScan = 0;
    function scanLoop() {
      if (!scanning) return;
      animFrame = requestAnimationFrame(scanLoop);
      const now = Date.now();
      if (now - lastScan < 150) return;
      lastScan = now;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        const w = Math.min(video.videoWidth, 1280);
        const h = Math.min(video.videoHeight, 1280);
        canvas.width = w;
        canvas.height = h;
        ctx.drawImage(video, 0, 0, w, h);
        const imageData = ctx.getImageData(0, 0, w, h);
        // Try both normal and inverted for screen QR codes
        let code = jsQR(imageData.data, imageData.width, imageData.height, {
          inversionAttempts: 'attemptBoth'
        });
        if (code) {
          const raw = code.data.trim();
          // Accept BILLVAULT: prefix or just BV- format
          if (raw.startsWith('BILLVAULT:')) {
            onQRDetected(raw.replace('BILLVAULT:', '').trim());
          } else if (raw.startsWith('BV-')) {
            onQRDetected(raw.trim());
          }
        }
      }
    }

    // ── QR Detected ────────────────────────────────────────────────────────
    async function onQRDetected(customerId) {
      scanning = false;
      cancelAnimationFrame(animFrame);

      // Show success UI
      cameraWrapper.classList.remove('scanning');
      cameraWrapper.classList.add('success');
      successOverlay.classList.add('show');

      resultId.textContent = customerId;
      resultCard.classList.add('show');
      resultStatus.textContent = 'Sending to merchant app...';
      setStatus('active', 'QR scanned successfully!');

      // Vibrate phone
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

      // Send to Firebase
      const sessionId = 'merchant_scan';
      try {
        await db.collection('scanner_sessions').doc(sessionId).set({
          customerId: customerId,
          scannedAt: firebase.firestore.FieldValue.serverTimestamp(),
          status: 'scanned'
        });
        resultStatus.textContent = '✅ Sent to merchant app successfully!';
        resultStatus.style.color = '#22C55E';
        scanAgainBtn.style.display = 'block';
      } catch (err) {
        resultStatus.textContent = '❌ Failed to send: ' + err.message;
        resultStatus.style.color = '#EF4444';
        showError('Firebase error: ' + err.message);
        scanAgainBtn.style.display = 'block';
      }
    }

    // ── Reset ──────────────────────────────────────────────────────────────
    function resetScanner() {
      scanning = true;
      cameraWrapper.classList.add('scanning');
      cameraWrapper.classList.remove('success');
      successOverlay.classList.remove('show');
      resultCard.classList.remove('show');
      errorCard.classList.remove('show');
      scanAgainBtn.style.display = 'none';
      resultStatus.style.color = '';
      setStatus('active', 'Ready to scan — point at customer QR');
      scanLoop();
    }

    // ── Helpers ────────────────────────────────────────────────────────────
    function setStatus(type, msg) {
      statusDot.className = 'status-dot ' + (type === 'active' ? 'active' : type === 'error' ? 'error' : '');
      statusText.textContent = msg;
    }

    function showError(msg) {
      errorCard.textContent = '⚠️ ' + msg;
      errorCard.classList.add('show');
    }

    // ── Init ───────────────────────────────────────────────────────────────
    startCamera();
  </script>
</body>
</html>
