<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>BillVault Scanner</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background:#0F1117;
      color:#F0F4FF;
      font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    .header {
      width:100%;
      background:#1A1D27;
      padding:16px 20px;
      display:flex;
      align-items:center;
      gap:10px;
      border-bottom:1px solid #2D3154;
    }
    .header-title { font-size:17px; font-weight:700; }
    .header-sub { font-size:11px; color:#8B92B8; }
    .content {
      width:100%;
      max-width:440px;
      padding:20px 16px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:16px;
    }
    .status-card {
      width:100%;
      background:#1A1D27;
      border-radius:12px;
      padding:14px 16px;
      display:flex;
      align-items:center;
      gap:10px;
      border:1px solid #2D3154;
    }
    .dot { width:10px; height:10px; border-radius:50%; background:#8B92B8; flex-shrink:0; transition:all 0.3s; }
    .dot.green { background:#22C55E; box-shadow:0 0 8px #22C55E; }
    .dot.red { background:#EF4444; }
    #statusText { font-size:13px; color:#8B92B8; }
    .camera-wrapper {
      width:100%;
      position:relative;
      border-radius:20px;
      overflow:hidden;
      border:2px solid #6C63FF;
      background:#000;
      aspect-ratio:1;
      box-shadow:0 0 24px rgba(108,99,255,0.3);
    }
    .camera-wrapper.success { border-color:#22C55E; box-shadow:0 0 24px rgba(34,197,94,0.4); }
    #video {
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    #canvas { display:none; }
    .overlay {
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:none;
    }
    .frame { width:62%; aspect-ratio:1; position:relative; }
    .c { position:absolute; width:28px; height:28px; border-color:#6C63FF; border-style:solid; }
    .c.tl { top:0; left:0; border-width:3px 0 0 3px; border-radius:6px 0 0 0; }
    .c.tr { top:0; right:0; border-width:3px 3px 0 0; border-radius:0 6px 0 0; }
    .c.bl { bottom:0; left:0; border-width:0 0 3px 3px; border-radius:0 0 0 6px; }
    .c.br { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 6px 0; }
    .scanline {
      position:absolute;
      left:4px; right:4px;
      height:2px;
      background:linear-gradient(90deg, transparent, #6C63FF, transparent);
      animation:scan 1.8s ease-in-out infinite;
    }
    @keyframes scan { 0%,100%{top:4px} 50%{top:calc(100% - 6px)} }
    .success-overlay {
      position:absolute;
      inset:0;
      background:rgba(34,197,94,0.15);
      display:none;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:8px;
    }
    .success-overlay.show { display:flex; }
    .success-icon { font-size:52px; }
    .success-text { font-size:18px; font-weight:700; color:#22C55E; }
    .instruction {
      text-align:center;
      font-size:13px;
      color:#8B92B8;
      line-height:1.7;
    }
    .instruction strong { color:#F0F4FF; }
    .result-card {
      width:100%;
      background:#1A1D27;
      border-radius:14px;
      padding:16px;
      border:1px solid #22C55E;
      display:none;
    }
    .result-card.show { display:block; }
    .result-label { font-size:11px; color:#8B92B8; margin-bottom:4px; text-transform:uppercase; letter-spacing:0.5px; }
    .result-id { font-size:22px; font-weight:700; color:#22C55E; font-family:monospace; }
    .result-status { font-size:12px; color:#8B92B8; margin-top:8px; }
    .error-card {
      width:100%;
      background:rgba(239,68,68,0.1);
      border:1px solid #EF4444;
      border-radius:12px;
      padding:14px;
      font-size:13px;
      color:#EF4444;
      display:none;
    }
    .error-card.show { display:block; }
    .btn-scan-again {
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid #2D3154;
      background:#1A1D27;
      color:#F0F4FF;
      font-size:15px;
      font-weight:600;
      cursor:pointer;
      display:none;
    }
    .btn-scan-again.show { display:block; }
    .btn-scan-again:active { opacity:0.7; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">💳 BillVault Scanner</div>
    <div class="header-sub">Merchant QR Scanner</div>
  </div>
</div>

<div class="content">
  <div class="status-card">
    <div class="dot" id="dot"></div>
    <div id="statusText">Starting camera...</div>
  </div>

  <div class="camera-wrapper" id="cameraWrapper">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="overlay">
      <div class="frame">
        <div class="c tl"></div><div class="c tr"></div>
        <div class="c bl"></div><div class="c br"></div>
        <div class="scanline"></div>
      </div>
    </div>
    <div class="success-overlay" id="successOverlay">
      <div class="success-icon">✅</div>
      <div class="success-text">Scanned!</div>
    </div>
  </div>

  <p class="instruction">
    Point at the <strong>customer's BillVault QR code</strong>.<br/>
    Keep steady — bill links automatically when detected.
  </p>

  <div class="error-card" id="errorCard"></div>

  <div class="result-card" id="resultCard">
    <div class="result-label">Customer ID Detected</div>
    <div class="result-id" id="resultId"></div>
    <div class="result-status" id="resultStatus">Sending to merchant app...</div>
  </div>

  <button class="btn-scan-again" id="scanAgainBtn" onclick="resetScanner()">
    📷 Scan Next Customer
  </button>
</div>

<script>
  firebase.initializeApp({
    apiKey: "AIzaSyBOvMjKZbGO65Gvb_77Zu_ndp3YoIDKBoI",
    authDomain: "billvault-9d571.firebaseapp.com",
    projectId: "billvault-9d571",
    storageBucket: "billvault-9d571.firebasestorage.app",
    messagingSenderId: "95121972208",
    appId: "1:95121972208:web:3da4af7e01b01b4dd1db35"
  });
  const db = firebase.firestore();

  const dot = document.getElementById('dot');
  const statusText = document.getElementById('statusText');
  const cameraWrapper = document.getElementById('cameraWrapper');
  const successOverlay = document.getElementById('successOverlay');
  const errorCard = document.getElementById('errorCard');
  const resultCard = document.getElementById('resultCard');
  const resultId = document.getElementById('resultId');
  const resultStatus = document.getElementById('resultStatus');
  const scanAgainBtn = document.getElementById('scanAgainBtn');
  const video = document.getElementById('video');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  let scanning = false;
  let rafId = null;
  let detected = false;

  function setStatus(type, msg) {
    dot.className = 'dot ' + type;
    statusText.textContent = msg;
    statusText.style.color = type === 'green' ? '#22C55E' : type === 'red' ? '#EF4444' : '#8B92B8';
  }

  function showError(msg) {
    errorCard.textContent = '⚠️ ' + msg;
    errorCard.classList.add('show');
  }

  async function startCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: 'environment' },
          width: { ideal: 1280 },
          height: { ideal: 1280 }
        }
      });
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        video.play();
        scanning = true;
        setStatus('green', 'Ready — point at customer QR');
        requestAnimationFrame(tick);
      };
    } catch (err) {
      setStatus('red', 'Camera error');
      showError('Camera access denied. Please allow camera and refresh.');
    }
  }

  // Brighten image to help detect screen QR codes
  function brightenImageData(data) {
    for (let i = 0; i < data.length; i += 4) {
      data[i]   = Math.min(255, data[i] * 1.3);
      data[i+1] = Math.min(255, data[i+1] * 1.3);
      data[i+2] = Math.min(255, data[i+2] * 1.3);
    }
    return data;
  }

  let lastCheck = 0;
  function tick(timestamp) {
    if (!scanning) return;
    rafId = requestAnimationFrame(tick);
    if (timestamp - lastCheck < 200) return; // check 5x per second
    lastCheck = timestamp;
    if (video.readyState < 2 || detected) return;

    const vw = video.videoWidth;
    const vh = video.videoHeight;
    if (!vw || !vh) return;

    canvas.width = vw;
    canvas.height = vh;
    ctx.drawImage(video, 0, 0, vw, vh);

    // Try normal
    let imageData = ctx.getImageData(0, 0, vw, vh);
    let code = jsQR(imageData.data, vw, vh, { inversionAttempts: 'attemptBoth' });

    // Try brightened if no result
    if (!code) {
      brightenImageData(imageData.data);
      code = jsQR(imageData.data, vw, vh, { inversionAttempts: 'attemptBoth' });
    }

    if (code && code.data) {
      handleQR(code.data.trim());
    }
  }

  function handleQR(raw) {
    let customerId = null;
    if (raw.startsWith('BILLVAULT:')) {
      customerId = raw.replace('BILLVAULT:', '').trim();
    } else if (raw.startsWith('BV-')) {
      customerId = raw;
    }
    if (!customerId) return;
    detected = true;
    onDetected(customerId);
  }

  async function onDetected(customerId) {
    scanning = false;
    cancelAnimationFrame(rafId);
    cameraWrapper.classList.add('success');
    successOverlay.classList.add('show');
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
    setStatus('green', 'QR scanned! Linking bill...');
    resultId.textContent = customerId;
    resultCard.classList.add('show');
    resultStatus.textContent = 'Sending to merchant app...';

    try {
      await db.collection('scanner_sessions').doc('merchant_scan').set({
        customerId: customerId,
        scannedAt: firebase.firestore.FieldValue.serverTimestamp(),
        status: 'scanned'
      });
      resultStatus.textContent = '✅ Bill linked successfully!';
      resultStatus.style.color = '#22C55E';
      setStatus('green', 'Done! Tap below to scan next');
    } catch (err) {
      resultStatus.textContent = '❌ Firebase error: ' + err.message;
      resultStatus.style.color = '#EF4444';
    }
    scanAgainBtn.classList.add('show');
  }

  function resetScanner() {
    detected = false;
    scanning = true;
    cameraWrapper.classList.remove('success');
    successOverlay.classList.remove('show');
    resultCard.classList.remove('show');
    errorCard.classList.remove('show');
    scanAgainBtn.classList.remove('show');
    resultStatus.style.color = '';
    setStatus('green', 'Ready — point at customer QR');
    requestAnimationFrame(tick);
  }

  startCamera();
</script>
</body>
</html>
